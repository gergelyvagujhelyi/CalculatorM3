name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Create keystore.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          printf '%s\n' "storeFile=../release-keystore.jks" > keystore.properties
          printf 'storePassword=%s\n' "$STORE_PASSWORD" >> keystore.properties
          printf 'keyAlias=%s\n' "$KEY_ALIAS" >> keystore.properties
          printf 'keyPassword=%s\n' "$KEY_PASSWORD" >> keystore.properties

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Update README checksums
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          MD5=$(md5sum "$APK" | awk '{print $1}')
          SHA1=$(sha1sum "$APK" | awk '{print $1}')
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          sed -i "s|<!-- md5 -->.*<!-- /md5 -->|<!-- md5 -->\`${MD5}\`<!-- /md5 -->|" README.md
          sed -i "s|<!-- sha1 -->.*<!-- /sha1 -->|<!-- sha1 -->\`${SHA1}\`<!-- /sha1 -->|" README.md
          sed -i "s|<!-- sha256 -->.*<!-- /sha256 -->|<!-- sha256 -->\`${SHA256}\`<!-- /sha256 -->|" README.md

      - name: Commit updated checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update checksums for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Calculator M3 ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
