name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Create keystore.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          printf '%s\n' "storeFile=../release-keystore.jks" > keystore.properties
          printf 'storePassword=%s\n' "$STORE_PASSWORD" >> keystore.properties
          printf 'keyAlias=%s\n' "$KEY_ALIAS" >> keystore.properties
          printf 'keyPassword=%s\n' "$KEY_PASSWORD" >> keystore.properties

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Build debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate checksums
        id: checksums
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          echo "md5=$(md5sum "$APK" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha1=$(sha1sum "$APK" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha256=$(sha256sum "$APK" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Calculator M3 ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |

            ## 🔑 Checksums

            | Algorithm  | Value |
            |------------|-------|
            | **MD5**    | `${{ steps.checksums.outputs.md5 }}` |
            | **SHA1**   | `${{ steps.checksums.outputs.sha1 }}` |
            | **SHA-256**| `${{ steps.checksums.outputs.sha256 }}` |
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.vagujhelyigergely.calculatorm3
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: production
          status: completed
          changesNotSentForReview: false
